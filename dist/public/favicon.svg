      <stop offset="55%"  stop-color="white" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="s" x1="20" y1="8" x2="20" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#BAD7FF"/>
      <stop offset="35%"  stop-color="#7EB8FF"/>
