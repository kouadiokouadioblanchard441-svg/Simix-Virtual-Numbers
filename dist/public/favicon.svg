  <!-- Border highlight -->
  <rect width="40" height="40" rx="10" stroke="white" stroke-opacity="0.12" stroke-width="0.8" fill="none"/>
  <!-- S letter -->
  <path
    d="M26.5 13.5 C26.5 9.5 13.5 9 13.5 16.2 C13.5 20.2 26.5 20.5 26.5 24.2 C26.5 31 13.5 30.5 13.5 27"
